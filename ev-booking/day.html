<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#8427E2">
<title>Availability — EV Charging Booking</title>
<style>
:root{
  --bg:#f4f6f8; --surface:#ffffff; --border:#e2e8f0; --border2:#cbd5e1;
  --text:#0f172a; --muted:#64748b; --brand:#8427E2; --brand-d:#6d1fc0;
  --brand-bg:#f3e8fd; --red:#dc2626; --amber:#b45309; --amber-bg:#fef3c7;
  --slate:#f1f5f9; --ring:rgba(132,39,226,.25);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh}
.wrap{max-width:920px;margin:0 auto;padding:18px 16px 56px}
header{display:flex;align-items:center;gap:12px;margin-bottom:4px;flex-wrap:wrap}
.logo{width:46px;height:46px;border-radius:12px;background:var(--brand);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:800;letter-spacing:.04em;flex-shrink:0}
header h1{font-size:1.15rem;font-weight:700}
header .sub{font-size:.78rem;color:var(--muted)}
.topnav{margin-left:auto;display:flex;gap:8px}
.navlink{font-size:.72rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 11px;border-radius:8px}
.navlink:hover{border-color:var(--border2);color:var(--text)}
.navlink.primary{background:var(--brand);color:#fff;border-color:var(--brand)}

.mode{font-size:.74rem;margin:14px 0 0;padding:8px 12px;border-radius:9px;display:inline-block}
.mode.admin{background:var(--brand-bg);color:var(--brand-d)}
.mode.public{background:var(--slate);color:var(--muted)}

.grid2{display:grid;grid-template-columns:320px 1fr;gap:18px;margin-top:16px;align-items:start}
@media(max-width:760px){ .grid2{grid-template-columns:1fr} }

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}

/* Calendar */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-head .mname{font-weight:700;font-size:.95rem}
.cal-nav{display:flex;gap:6px}
.iconbtn{width:30px;height:30px;border:1px solid var(--border2);background:var(--surface);border-radius:8px;cursor:pointer;font-size:1rem;line-height:1;color:var(--text)}
.iconbtn:hover{border-color:var(--brand);color:var(--brand)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-grid .dow{font-size:.66rem;color:var(--muted);text-align:center;padding:4px 0;font-weight:600;text-transform:uppercase}
.cal-day{aspect-ratio:1;border:1px solid transparent;border-radius:8px;background:none;cursor:pointer;
  font-size:.82rem;color:var(--text);display:flex;align-items:center;justify-content:center}
.cal-day:hover{background:var(--brand-bg)}
.cal-day.other{color:#cbd5e1;cursor:default}
.cal-day.other:hover{background:none}
.cal-day.today{border-color:var(--brand)}
.cal-day.selected{background:var(--brand);color:#fff;font-weight:700}
.cal-day.selected:hover{background:var(--brand-d)}

/* Day panel */
.day-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.day-head .dtitle{font-weight:700;font-size:1rem}
.day-head .right{display:flex;gap:6px;align-items:center}
.btn-today{font-size:.74rem;padding:6px 11px;border:1px solid var(--border2);background:var(--surface);border-radius:8px;cursor:pointer}
.btn-today:hover{border-color:var(--brand);color:var(--brand)}

.daygrid{display:grid;grid-template-columns:auto 1fr 1fr;gap:8px;align-items:stretch}
.daygrid .gh{font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;padding:2px 4px;align-self:center}
.daygrid .gh.bay{text-align:center}
.tlabel{font-size:.8rem;font-weight:600;color:var(--text);display:flex;align-items:center;white-space:nowrap;padding-right:4px}
.cell{border-radius:10px;padding:9px 10px;font-size:.82rem;min-height:48px;display:flex;flex-direction:column;justify-content:center;border:1px solid var(--border)}
.cell.available{background:var(--brand-bg);border-color:#e6d4fb;color:var(--brand-d);cursor:pointer;font-weight:600;transition:.12s}
.cell.available:hover{background:#ecdcfd;border-color:var(--brand)}
.cell.available .tap{font-weight:400;font-size:.7rem;color:var(--brand-d);opacity:.8}
.cell.booked{background:var(--slate);border-color:var(--border);color:var(--text)}
.cell.booked .who{font-weight:700;font-size:.84rem}
.cell.booked .reg{font-size:.74rem;color:var(--muted);font-family:ui-monospace,monospace;letter-spacing:.02em}
.cell.booked .tag{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.cell.past{background:#fafbfc;border-style:dashed;color:#cbd5e1;align-items:center;justify-content:center}
.cell .pending{margin-top:5px;font-size:.7rem;color:var(--amber);background:var(--amber-bg);border-radius:6px;padding:2px 6px}

.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;font-size:.74rem;color:var(--muted)}
.legend .k{display:inline-flex;align-items:center;gap:6px}
.legend .sw{width:12px;height:12px;border-radius:3px;border:1px solid var(--border)}
.legend .sw.available{background:var(--brand-bg);border-color:#e6d4fb}
.legend .sw.booked{background:var(--slate)}
.legend .sw.pending{background:var(--amber-bg)}
.loading{color:var(--muted);font-size:.85rem;padding:20px;text-align:center}
.banner{display:none;background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;border-radius:10px;padding:10px 13px;font-size:.84rem;margin-top:12px}
.banner.show{display:block}
footer{text-align:center;font-size:.7rem;color:var(--muted);margin-top:26px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">IFS</div>
    <div>
      <h1>Charging Availability</h1>
      <div class="sub">Staines office · Bay 1 &amp; Bay 2</div>
    </div>
    <nav class="topnav">
      <a class="navlink primary" href="index.html">Book a slot</a>
      <a class="navlink" href="admin.html">Facilities</a>
    </nav>
  </header>

  <div id="mode" class="mode public">Showing public availability — sign in on the Facilities page to see booking details.</div>
  <div id="banner" class="banner"></div>

  <div class="grid2">
    <!-- Calendar -->
    <div class="card">
      <div class="cal-head">
        <div class="mname" id="mname">—</div>
        <div class="cal-nav">
          <button class="iconbtn" id="prevMonth" aria-label="Previous month">‹</button>
          <button class="iconbtn" id="nextMonth" aria-label="Next month">›</button>
        </div>
      </div>
      <div class="cal-grid" id="cal"></div>
    </div>

    <!-- Day view -->
    <div class="card">
      <div class="day-head">
        <button class="iconbtn" id="prevDay" aria-label="Previous day">‹</button>
        <div class="dtitle" id="dtitle">—</div>
        <div class="right">
          <button class="iconbtn" id="nextDay" aria-label="Next day">›</button>
          <button class="btn-today" id="todayBtn">Today</button>
        </div>
      </div>
      <div id="day"><div class="loading">Loading…</div></div>
      <div class="legend">
        <span class="k"><span class="sw available"></span> Available</span>
        <span class="k"><span class="sw booked"></span> Booked</span>
        <span class="k" id="legendPending" style="display:none"><span class="sw pending"></span> Pending</span>
      </div>
    </div>
  </div>

  <footer>IFS · Internal use only</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
(function(){
  const cfg = window.EV_CONFIG || {};
  const SLOTS = window.EV_SLOTS || [];
  const configured = cfg.SUPABASE_URL && !cfg.SUPABASE_URL.includes("YOUR-PROJECT")
                  && cfg.SUPABASE_ANON_KEY && !cfg.SUPABASE_ANON_KEY.includes("YOUR-ANON");
  const $ = id => document.getElementById(id);
  const sb = configured ? supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY) : null;

  let isAdmin = false;
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  function localDate(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  const today = new Date();
  const todayStr = localDate(today);
  let selectedStr = todayStr;
  let viewYear = today.getFullYear(), viewMonth = today.getMonth();

  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function slotStartHour(slot){ return parseInt(slot.slice(0,2),10); }
  function prettyDate(d){ const dt=new Date(d+"T00:00:00"); return dt.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"}); }
  function banner(m){ const b=$("banner"); if(!m){b.classList.remove("show");return;} b.textContent=m; b.classList.add("show"); }

  // ── Calendar ──
  function renderCalendar(){
    $("mname").textContent = MONTHS[viewMonth]+" "+viewYear;
    const cal = $("cal");
    cal.innerHTML = DOW.map(d=>'<div class="dow">'+d+'</div>').join("");
    const first = new Date(viewYear, viewMonth, 1);
    // Monday-first offset (JS getDay: 0=Sun..6=Sat)
    let offset = (first.getDay()+6)%7;
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
    for(let i=0;i<offset;i++){ const c=document.createElement("div"); c.className="cal-day other"; cal.appendChild(c); }
    for(let d=1; d<=daysInMonth; d++){
      const ds = viewYear+"-"+String(viewMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
      const c=document.createElement("button"); c.className="cal-day"; c.textContent=d;
      if(ds===todayStr) c.classList.add("today");
      if(ds===selectedStr) c.classList.add("selected");
      c.addEventListener("click",()=>{ selectedStr=ds; renderCalendar(); loadDay(); });
      cal.appendChild(c);
    }
  }

  // ── Day view ──
  async function fetchDay(dateStr){
    if(!sb) return [];
    if(isAdmin){
      const { data, error } = await sb.from("bookings")
        .select("bay,slot,status,name,reg,phone").eq("date", dateStr).in("status",["pending","approved"]);
      if(error) throw error;
      return data||[];
    } else {
      const { data, error } = await sb.from("public_availability").select("bay,slot").eq("date", dateStr);
      if(error) throw error;
      return (data||[]).map(r=>({bay:r.bay, slot:r.slot, status:"approved"}));
    }
  }

  async function loadDay(){
    $("dtitle").textContent = prettyDate(selectedStr);
    $("day").innerHTML = '<div class="loading">Loading…</div>';
    let rows=[];
    try{ rows = await fetchDay(selectedStr); banner(""); }
    catch(e){ banner("Couldn't load availability — please refresh."); console.error(e); }
    renderDay(rows);
  }

  function renderDay(rows){
    const isToday = selectedStr===todayStr;
    const nowHour = new Date().getHours();
    // index bookings by bay -> slot
    function approvedFor(bay,slot){ return rows.find(r=>Number(r.bay)===bay && r.slot===slot && r.status==="approved"); }
    function pendingFor(bay,slot){ return rows.filter(r=>Number(r.bay)===bay && r.slot===slot && r.status==="pending"); }

    function cell(bay, slot){
      const past = isToday && slotStartHour(slot) <= nowHour;
      const appr = approvedFor(bay, slot);
      if(appr){
        if(isAdmin){
          return '<div class="cell booked"><span class="who">'+esc(appr.name)+'</span>'+
                 (appr.reg?'<span class="reg">'+esc(appr.reg)+'</span>':'')+'</div>';
        }
        return '<div class="cell booked"><span class="tag">Booked</span></div>';
      }
      if(past){ return '<div class="cell past">Past</div>'; }
      // available
      let pendNote = "";
      if(isAdmin){
        const pend = pendingFor(bay, slot);
        if(pend.length){
          pendNote = '<span class="pending">⏳ '+pend.map(p=>esc(p.name)+(p.reg?" ("+esc(p.reg)+")":"")).join(", ")+'</span>';
        }
      }
      const href = "index.html?bay="+bay+"&date="+encodeURIComponent(selectedStr)+"&slot="+encodeURIComponent(slot);
      return '<a class="cell available" href="'+href+'"><span>Available</span><span class="tap">Tap to book</span>'+pendNote+'</a>';
    }

    let html = '<div class="daygrid">'+
      '<div class="gh"></div><div class="gh bay">Bay 1</div><div class="gh bay">Bay 2</div>';
    SLOTS.forEach(slot=>{
      html += '<div class="tlabel">'+esc(slot)+'</div>'+ cell(1,slot) + cell(2,slot);
    });
    html += '</div>';
    $("day").innerHTML = html;
  }

  // ── Admin detection (optional) ──
  async function detectAdmin(){
    if(!sb) return;
    try{
      const { data:{ session } } = await sb.auth.getSession();
      if(!session) return;
      const email = (session.user && session.user.email || "").toLowerCase();
      const { data } = await sb.from("admins").select("email").eq("email", email).maybeSingle();
      if(data){
        isAdmin = true;
        $("mode").className = "mode admin";
        $("mode").textContent = "Admin view — showing names, registrations and pending requests.";
        $("legendPending").style.display = "inline-flex";
      }
    }catch(e){ /* stay public */ }
  }

  // ── Nav ──
  function shiftDay(n){
    const d=new Date(selectedStr+"T00:00:00"); d.setDate(d.getDate()+n);
    selectedStr=localDate(d); viewYear=d.getFullYear(); viewMonth=d.getMonth();
    renderCalendar(); loadDay();
  }
  $("prevDay").addEventListener("click",()=>shiftDay(-1));
  $("nextDay").addEventListener("click",()=>shiftDay(1));
  $("todayBtn").addEventListener("click",()=>{ selectedStr=todayStr; viewYear=today.getFullYear(); viewMonth=today.getMonth(); renderCalendar(); loadDay(); });
  $("prevMonth").addEventListener("click",()=>{ viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} renderCalendar(); });
  $("nextMonth").addEventListener("click",()=>{ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} renderCalendar(); });

  if(!sb){ banner("Not configured — add your Supabase keys in config.js (see SETUP.md)."); }

  // init
  (async function(){
    renderCalendar();
    await detectAdmin();
    await loadDay();
  })();
})();
</script>
</body>
</html>
